name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: "esp32:esp32"
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          cli-compile-flags: |
            - --warnings=default
            - --export-binaries
            - --build-cache-path=build-cache
          sketch-paths: |
            - gmpro87
      - name: Find binaries
        run: find . -name "*.bin" -type f
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            gmpro87/build/esp32.esp32.esp32/gmpro87.ino.bin
