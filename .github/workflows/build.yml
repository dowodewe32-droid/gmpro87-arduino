name: Build GMpro87 with Large Partition

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Arduino CLI
        run: |
          curl -fsSL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz | tar xz
          chmod +x arduino-cli

      - name: Create custom partition
        run: |
          # Custom CSV with larger app partition
          cat > partitions_custom.csv << 'EOF'
          # Name,   Type, SubType, Offset,  Size, Flags
          nvs,     data, nvs,     0x9000,  0x5000,
          otadata,  data, ota,     0xe000,  0x2000,
          app0,    app,  ota_0,    0x20000, 0x2E0000,
          app1,    app,  ota_1,    0x300000,0x2E0000,
          spiffs,  data, spiffs,  0x5E0000,0x820000,
          EOF
          echo "Custom partition created"

      - name: Setup ESP32 Core
        run: |
          ./arduino-cli core update-index
          ./arduino-cli core install esp32:esp32@3.3.8

      - name: Compile with custom partition
        run: |
          ./arduino-cli compile \
            -b esp32:esp32:esp32 \
            --config-file partitions_custom.csv \
            gmpro87/gmpro87.ino \
            --output-dir build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*.bin