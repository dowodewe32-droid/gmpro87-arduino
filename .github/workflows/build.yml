name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: "esp32:esp32"
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          cli-compile-flags: |
            - --warnings=default
            - --export-binaries
          sketch-paths: |
            - gmpro87
      - name: Merge to Full Binary
        run: |
          cd gmpro87/build/esp32.esp32.esp32
          pip install esptool
          esptool.py --chip esp32 merge_bin -o /tmp/gmpro87_full.bin \
            0x1000 bootloader/bootloader.bin \
            0x8000 partitions.bin \
            0xe000 boot_app0.bin \
            0x10000 gmpro87.ino.bin
      - name: Upload Full Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/gmpro87_full.bin
