name: Build & Release Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Arduino CLI
        run: |
          curl -fsSL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz | tar xz
          chmod +x arduino-cli

      - name: Setup ESP32 Core
        run: |
          ./arduino-cli core update-index
          ./arduino-cli core install esp32:esp32@3.3.8

      - name: Compile
        run: |
          ./arduino-cli compile -b esp32:esp32:esp32 gmpro87/gmpro87.ino

      - name: Find Binaries
        run: |
          find . -name "*.bin" -type f
          BUILD_DIR=$(find . -name "gmpro87.ino.bin" -type f | xargs dirname | head -1)
          echo "Build: $BUILD_DIR"
          ls -la "$BUILD_DIR/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./**/gmpro87.ino.bin