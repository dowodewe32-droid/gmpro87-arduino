name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: "esp32:esp32"
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          cli-compile-flags: |
            - --warnings=default
            - --build-property=partition_type=min_spiffs
          sketch-paths: |
            - arduino-deauth.ino
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            /root/.arduino/build-cache/*.bin
